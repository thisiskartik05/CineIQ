<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0f0f0f"/>
  <!-- Film perforations left -->
  <rect x="4" y="10" width="8" height="6" rx="1.5" fill="#2a2a2a"/>
  <rect x="4" y="22" width="8" height="6" rx="1.5" fill="#2a2a2a"/>
  <rect x="4" y="34" width="8" height="6" rx="1.5" fill="#2a2a2a"/>
  <rect x="4" y="46" width="8" height="6" rx="1.5" fill="#2a2a2a"/>
  <!-- Film perforations right -->
  <rect x="52" y="10" width="8" height="6" rx="1.5" fill="#2a2a2a"/>
  <rect x="52" y="22" width="8" height="6" rx="1.5" fill="#2a2a2a"/>
  <rect x="52" y="34" width="8" height="6" rx="1.5" fill="#2a2a2a"/>
  <rect x="52" y="46" width="8" height="6" rx="1.5" fill="#2a2a2a"/>
  <!-- "C" letter, Netflix red -->
  <text x="16" y="46" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" fill="#e50914">C</text>
  <!-- "IQ" letters, white -->
  <text x="37" y="46" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#ffffff">IQ</text>
</svg>
